<!-- templates/includes/navbar.html -->
{% load static %}

<nav class="navbar navbar-expand-lg navbar-light fixed-top">
    <div class="container">
        <a class="navbar-brand" href="{% url 'core:home' %}">
            <span class="brand-icon">W</span>
            <span class="brand-text">Wakuthii</span>
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" 
                aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'core:home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'about' in request.path %}active{% endif %}" href="{% url 'core:about' %}">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'services' in request.path %}active{% endif %}" href="{% url 'core:services' %}">Services</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'contact' in request.path %}active{% endif %}" href="{% url 'core:contact' %}">Contact</a>
                </li>
            </ul>
            
            <ul class="navbar-nav">
                {% if user.is_authenticated and user.is_superuser or user.is_staff %}
                    <li class="nav-item">
                        <a class="nav-link {% if 'dashboard' in request.path or 'customers' in request.path %}active{% endif %}" href="{% url 'core:admin_dashboard' %}">
                            <i class="fas fa-chart-line"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'accounts:admin_logout' %}">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link {% if 'login' in request.path %}active{% endif %}" href="{% url 'accounts:admin_login' %}">
                            <i class="fas fa-sign-in-alt"></i> Admin Login
                        </a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
